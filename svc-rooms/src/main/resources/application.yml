server:
  port: 8081

spring:
  application:
    name: svc-rooms
  datasource:
    url: jdbc:postgresql://rooms-db:5432/rooms_db
    username: rooms_user
    password: rooms_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.uti.svcrooms: INFO
