server:
  port: 8082

spring:
  application:
    name: svc-reservations
  datasource:
    url: jdbc:postgresql://reservations-db:5432/reservations_db
    username: reservations_user
    password: reservations_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

# Base URL of svc-rooms as seen from inside the Docker network
rooms:
  service:
    url: http://svc-rooms:8081

resilience4j:
  circuitbreaker:
    instances:
      roomsService:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      roomsService:
        max-attempts: 3
        wait-duration: 2s

management:
  endpoints:
    web:
      exposure:
        include: health,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

logging:
  level:
    com.uti.svcreservations: INFO
    io.github.resilience4j: DEBUG
